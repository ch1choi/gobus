        const DIT_STATS_ROUTES = { "108": 1, "501": 1, "511": 1, "513": 1 };

        /** ditransfer nginx → dongin-bus-admin 집계 (실패 무시). */
        function ditSendPageStats(kind, route) {
            try {
                const isRoute = kind === "route";
                let body = "kind=" + (isRoute ? "route" : "total");
                if (isRoute) {
                    if (route == null || !DIT_STATS_ROUTES[String(route)]) return;
                    body += "&route=" + encodeURIComponent(String(route));
                }
                if (navigator.sendBeacon) {
                    const blob = new Blob([body], { type: "application/x-www-form-urlencoded" });
                    navigator.sendBeacon("/dit-collect/pageview", blob);
                } else {
                    fetch("/dit-collect/pageview", {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: body,
                        keepalive: true
                    });
                }
            } catch (e) { /* 무시 */ }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const routeParam = urlParams.get('route');
            if (routeParam) {
                isCrewMode = false;
                startApp(routeParam);
            } else {
                isCrewMode = true;
                document.getElementById('crew-selection-screen').style.display = 'flex';
            }
            startGlobalTimer();
            ditSendPageStats("total");
        };

        function startApp(route) {
            if (route != null && DIT_STATS_ROUTES[String(route)]) {
                ditSendPageStats("route", route);
            }
            currentRoute = route;
            document.getElementById('crew-selection-screen').style.display = 'none';

            if(isCrewMode) document.getElementById('crew-reset-link').style.display = 'inline';

            updateRouteUI();
            
            // GPS 위치가 파악되기 전까지 먼저 리스트를 모두 띄워서 빈 화면 방지
            showStops(currentDirection);

        function updateRouteUI() {
            const upBtn = document.getElementById('btn-up');

                upBtn.innerHTML = `상행<br><span style="font-size:11px; font-weight:normal;">${routeSummary[currentRoute].up}</span>`;

        function initGps() {
            if (navigator.geolocation) {
                document.getElementById('gps-status').innerHTML = `⏳ 위치 정보 확인 중... (목록을 불러옵니다)`;
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('gps-status').innerHTML = `📍 위치 확인 완료! (가까운 10개 정류장 표시)`;
                    showStops(currentDirection); 
                }, () => {
                    document.getElementById('gps-status').innerHTML = `⚠️ 위치 권한이 없어 전체 노선을 표시합니다.`;
                }, { timeout: 7000, maximumAge: 0 });
            } else {
                document.getElementById('gps-status').innerHTML = `⚠️ GPS 미지원 기기입니다. 전체 노선을 표시합니다.`;
            }
        }

        function setDirection(dir) {
            currentDirection = dir;
            document.getElementById('btn-up').classList.toggle('btn-active', dir === 'up');
            document.getElementById('btn-down').classList.toggle('btn-active', dir === 'down');
            showStops(dir);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function showStops(direction) {
            const listContainer = document.getElementById('stop-list-container');
            listContainer.innerHTML = '';
            let stops = allBusData[currentRoute][direction] || [];
            
            if (userLocation && stops.length > 0) {
                let minIdx = 0, minD = Infinity;
                stops.forEach((s, i) => {
                    let d = getDistance(userLocation.lat, userLocation.lng, s.lat, s.lng);
                    if (d < minD) { minD = d; minIdx = i; }
                });
                stops = stops.slice(minIdx, minIdx + 10);
            }

            stops.forEach(stop => {
                const li = document.createElement('li');
                li.className = 'stop-item';
                li.innerHTML = `
                    <div class="stop-header" id="header-${stop.sid}" data-sid="${stop.sid}" data-name="${stop.name}" onclick="toggleTransfer(this)">
                        <span>📍 ${stop.name}</span><span class="transfer-btn">환승보기 🔄</span>
                    </div>
                    <div class="transfer-box" id="box-${stop.sid}"></div>
                `;
                listContainer.appendChild(li);
            });

            if (userLocation) {
                const btnLi = document.createElement('li');
                btnLi.style.listStyle = 'none';
                btnLi.innerHTML = `<button class="all-view-btn" onclick="resetGps()">전체 노선 보기</button>`;
                listContainer.appendChild(btnLi);
            }
        }

        function resetGps() {
            userLocation = null;
            document.getElementById('gps-status').style.display = 'none';
            showStops(currentDirection);
        }

        function formatTime(totalSec) {
            if (totalSec <= 0) return "곧 도착";
            let m = Math.floor(totalSec / 60);
            let s = totalSec % 60;
            return (m > 0 ? `${m}분 ` : "") + `${s}초`;
        }

        function formatPos(posStr) {
            if (!posStr) return "";
            let clean = posStr.trim().replace("전", "");
            return isNaN(clean) ? posStr : `${clean}개 전`;
        }

        // 🚨 정렬 기준 변경 함수
        window.changeSort = function(sid, type) {
            window.currentSort = type;
            const box = document.getElementById(`box-${sid}`);
            const header = document.getElementById(`header-${sid}`);
            if (box && header) renderTransferBox(sid, box, header.dataset.name);
        };

        // 🚨 저장된 캐시 데이터로 화면을 그리는 렌더링 함수
        function renderTransferBox(sid, box, stopName) {
            let groups = window.transferCache[sid];
            if (!groups) return;

            let routes = Object.keys(groups).map(rNo => {
                return { rNo: rNo, dest: groups[rNo].dest, arrs: groups[rNo].arrs };
            });

            // 선택한 정렬 방식에 따라 리스트 정렬
            if (window.currentSort === 'time') {
                routes.sort((a, b) => a.arrs[0].totalSec - b.arrs[0].totalSec);
            } else {
                routes.sort((a, b) => parseInt(a.rNo.replace(/[^0-9]/g, '')) - parseInt(b.rNo.replace(/[^0-9]/g, '')));
            }

            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <b><span style="color:#00529b;">${stopName}</span> 환승 정보</b>
                    <div style="font-size:12px; display:flex; gap: 8px;">
                        <label style="cursor:pointer;"><input type="radio" name="sort_${sid}" value="route" ${window.currentSort==='route'?'checked':''} onchange="changeSort('${sid}', 'route')"> 번호순</label>
                        <label style="cursor:pointer;"><input type="radio" name="sort_${sid}" value="time" ${window.currentSort==='time'?'checked':''} onchange="changeSort('${sid}', 'time')"> 시간순</label>
                    </div>
                </div>
                <hr style="border:0.5px solid #ccc; margin-bottom:10px;">
            `;

            if (routes.length === 0) {
                box.innerHTML = html + "환승 가능한 다른 노선 정보가 없습니다.";
                return;
            }

            routes.forEach(r => {
                let displaySec1 = r.arrs[0].totalSec;
                let timeStr1 = `<span class="live-sec" data-totalsec="${displaySec1}">${formatTime(displaySec1)}</span>`;
                let info = `<b style="color: #d32f2f; font-size:16px;">${timeStr1} <span style="font-size:14px; font-weight:normal;">(${formatPos(r.arrs[0].pos)})</span></b>`;
                
                // 2번째 버스 렌더링
                if (r.arrs[1]) {
                    let displaySec2 = r.arrs[1].totalSec;
                    let timeStr2 = `<span class="live-sec" data-totalsec="${displaySec2}">${formatTime(displaySec2)}</span>`;
                    info += `<br><span style="color:#666; font-size:14px; display:inline-block; margin-top:4px;">${timeStr2} (${formatPos(r.arrs[1].pos)})</span>`;
                }
                
                html += `
                    <div class="arrival-item">
                        <span class="route-badge">${r.rNo}번</span> <small>(${r.dest}행)</small><br>
                        <div style="margin-top:5px;">${info}</div>
                    </div>`;
            });
            box.innerHTML = html;
        }

        // 글로벌 카운트다운 타이머 (앱 내의 캐시 시간도 함께 줄임)
        function startGlobalTimer() {
            setInterval(() => {
                // 백그라운드 데이터의 시간 차감 (정렬 변경 시 시간이 튀는 것 방지)
                for (let sid in window.transferCache) {
                    for (let rNo in window.transferCache[sid]) {
                        window.transferCache[sid][rNo].arrs.forEach(arr => {
                            if (arr.totalSec > 0) arr.totalSec--;
                        });
                    }
                }

                // 눈에 보이는 화면 시간 차감
                document.querySelectorAll('.live-sec').forEach(el => {
                    let s = parseInt(el.dataset.totalsec);
                    if (s > 0) {
                        s--;
                        el.dataset.totalsec = s;
                        el.innerText = formatTime(s);
                    } else {
                        el.innerText = "곧 도착";
                    }
                });
            }, 1000);
        }

        async function toggleTransfer(element, isRefresh = false) {
            const sid = element.dataset.sid;
            const stopName = element.dataset.name;
            const box = element.nextElementSibling;
            
            if (!isRefresh && box.style.display === 'block') { box.style.display = 'none'; return; }
            
            document.querySelectorAll('.transfer-box').forEach(b => {
                if (b !== box) b.style.display = 'none';
            });

            box.style.display = 'block';
            if (!isRefresh) box.innerHTML = `⏳ 실시간 정보를 불러오는 중...`;

            try {
                const q = new URLSearchParams({ serviceKey: "dd4c0534cd503e57a9e382fd2c23f911f31eb3652025e3819236420d64449c0d", arsId: String(sid) });
                const res = await fetch(`/api/getArrInfoByUid?${q}`);
                if (!res.ok) throw new Error(`서버 응답 오류`);

                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const mh = xml.querySelector("msgHeader");
                const headerCd = mh?.querySelector("headerCd")?.textContent?.trim();
                
                if (headerCd !== undefined && headerCd !== "" && headerCd !== "0") {
                    box.innerHTML = `<div style="color:#d32f2f; font-size:12px;">⚠️ OPEN API 오류 (${headerCd})</div>`;
                    return;
                }

                const items = xml.querySelectorAll("itemList");
                if (items.length === 0) {
                    box.innerHTML = "❌ 도착 예정인 버스가 없습니다.";
                    return;
                }
                
                // 🚨 2대 파싱 완벽 적용
                const groups = {};
                items.forEach(item => {
                    const rNo = item.querySelector("ROUTE_NO").textContent;
                    if (!groups[rNo]) {
                        groups[rNo] = { dest: item.querySelector("DESTINATION")?.textContent || "종점", arrs: [] };
                    }

                    const parseBus = (minTag, secTag, posTag) => {
                        let secVal = item.querySelector(secTag)?.textContent;
                        let minVal = item.querySelector(minTag)?.textContent;
                        let posVal = item.querySelector(posTag)?.textContent;
                        
                        let totalSec = null;
                        if (secVal && secVal.trim() !== "") {
                            totalSec = parseInt(secVal.trim(), 10);
                        } else if (minVal && minVal.trim() !== "") {
                            totalSec = parseInt(minVal.trim(), 10) * 60;
                        }

                        if (totalSec !== null) {
                            // 완전히 똑같은 정보가 중복으로 들어가는 것을 방지
                            if (!groups[rNo].arrs.find(a => a.totalSec === totalSec && a.pos === posVal)) {
                                groups[rNo].arrs.push({ totalSec: totalSec, pos: posVal });
                            }
                        }
                    };

                    // API가 제공하는 첫 번째, 두 번째 버스 태그 모두 수집
                    parseBus("EXTIME_MIN", "EXTIME_SEC", "STATUS_POS");
                    parseBus("EXTIME_MIN2", "EXTIME_SEC2", "STATUS_POS2");
                });

                // 수집된 버스를 시간순으로 정렬하고 각 노선당 최대 2대까지만 자름
                Object.keys(groups).forEach(rNo => {
                    groups[rNo].arrs.sort((a, b) => a.totalSec - b.totalSec);
                    groups[rNo].arrs = groups[rNo].arrs.slice(0, 2);
                    
                    // 🚨 시간 역행(튕김) 방지 로직
                    if (isRefresh && window.transferCache[sid]) {
                        if (window.transferCache[sid][rNo]) {
                            let oldBus1 = window.transferCache[sid][rNo].arrs[0];
                            let newBus1 = groups[rNo].arrs[0];
                            if (oldBus1 && newBus1) {
                                if (newBus1.totalSec > oldBus1.totalSec && (newBus1.totalSec - oldBus1.totalSec) < 45) {
                                    newBus1.totalSec = oldBus1.totalSec;
                                }
                            }
                        }
                    }
                });

                // 캐시에 저장 후 화면 렌더링 호출
                window.transferCache[sid] = groups;
                renderTransferBox(sid, box, stopName);

            } catch (e) {
                console.error("에러 상세:", e);
                box.innerHTML = `<div style="color:#d32f2f; font-size:12px;">⚠️ 정보 조회 실패 (네트워크 확인)</div>`;
            }
        }

        // 플로팅 새로고침 버튼 
        function forceRefresh() {
            let t = document.getElementById("toast");
            t.innerText = "위치 갱신 중...";
            t.className = "show";

            let openStopNames = [];
            document.querySelectorAll('.transfer-box').forEach(box => {
                if (box.style.display === 'block') {
                    openStopNames.push(box.previousElementSibling.dataset.name);
                }
            });

            if (navigator.geolocation && userLocation !== null) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        showStops(currentDirection); 
                        
                        openStopNames.forEach(name => {
                            let header = document.querySelector(`.stop-header[data-name="${name}"]`);
                            if(header) toggleTransfer(header, true);
                        });

                        t.innerText = "위치 및 목록 갱신 완료!";
                        setTimeout(() => t.className = "", 2000);
                    }, 
                    () => {
                        openStopNames.forEach(name => {
                            let header = document.querySelector(`.stop-header[data-name="${name}"]`);
                            if(header) toggleTransfer(header, true);
                        });
                        t.innerText = "새로고침 완료 (위치 갱신 실패)";
                        setTimeout(() => t.className = "", 2000);
                    }, 
                    { timeout: 7000, maximumAge: 0 }
                );
            } else {
                openStopNames.forEach(name => {
                    let header = document.querySelector(`.stop-header[data-name="${name}"]`);
                    if(header) toggleTransfer(header, true);
                });
                t.innerText = "새로고침 완료";
                setTimeout(() => t.className = "", 2000);
            }
        }
    </script>
</body>
