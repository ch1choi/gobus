version: '3.8'

services:
  # ===== VM-1: DMZ + WEB Zone (dmz-web-svr) =====
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/quizadm/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/quizadm/nginx/conf.d:/etc/nginx/conf.d:ro
      - /project2/gimmeQUIZ2.0/public:/project2/gimmeQUIZ2.0/public:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == dmz-web
      resources:
        limits:
          memory: 50M
        reservations:
          memory: 30M

  # dongin_bus (ditransfer) — 관리자 UI/API. 호스트의 dongin_bus 와 nginx 정적 root 동일 디렉터리.
  # nginx dit-admin.conf 의 upstream 은 Swarm 오버레이 DNS 로 http://dongin-bus-admin:3000 (127.0.0.1 아님).
  dongin-bus-admin:
    image: ${DONGIN_BUS_ADMIN_IMAGE:-dongin-bus-admin:latest}
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
      - PORT=3000
      - DONGIN_BUS_DIR=/srv/dongin_bus
      - COOKIE_SECURE=1
    env_file:
      - env/dongin-bus-admin.env
    volumes:
      - /project2/gimmeQUIZ2.0/public/dongin_bus:/srv/dongin_bus
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == dmz-web
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 96M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == dmz-web
      resources:
        limits:
          memory: 50M
        reservations:
          memory: 30M
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"

  api-gateway:
    image: choicho/gimme-quiz-api-gateway:${API_GATEWAY_VERSION:-1.0.1}-amd64
    env_file: env/gateway.production.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
    ports:
      - "3000:3000"
    volumes:
      - /project2/gimmeQUIZ2.0/logs/api-gateway:/project2/gimmeQUIZ2.0/logs/api-gateway
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == dmz-web
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M

  # ===== SFC (dmz-web: api-gw만 사용, sfc는 기존 nginx-proxy conf.d에 추가) =====
  sfc-api-gw:
    image: ${SFC_API_GW_IMAGE:-choicho/sfc-api-gw:1.0-amd64}
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=Asia/Seoul
      - SFC_SVR_URL=http://sfc-svr:3001
      - SFC_PROXY_TIMEOUT_MS=900000
      # SFC 웹 로그인 계정 (미설정 시 기본값 sfc/sfc)
      - SFC_LOGIN_USER=${SFC_LOGIN_USER:-sfc}
      - SFC_LOGIN_PASS=gkskdlstm1!
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == dmz-web
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 80M
      restart_policy:
        condition: on-failure
        delay: 5s

  # ===== VM-2: AP Zone (int-ap-svr) =====
  admin-service:
    image: choicho/gimme-quiz-admin-service:${ADMIN_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/admin.production.env
    environment:
      - NODE_ENV=production
      - PORT=${ADMIN_SERVICE_PORT}
      - TZ=Asia/Seoul
    volumes:
      - admin_sqlite_data:/app/data
      - /project2/gimmeQUIZ2.0/logs/admin-service:/project2/gimmeQUIZ2.0/logs/admin-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M
    healthcheck:
      disable: true

  # SFC 컨텐츠(영상/이미지/BGM): int-ap-svr에 /mnt/sfc 마운트 필요 (로컬 또는 NFS). see docker/SFC_STORAGE.md
  # env_file은 docker stack deploy에서 무시됨 → 배포 전 env 파일 source 후 배포 (see deploy-sfc-stack.sh)
  sfc-svr:
    image: ${SFC_SVR_IMAGE:-choicho/sfc-svr:1.0-amd64}
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=Asia/Seoul
      - DATABASE_URL=postgresql://sfc:${SFC_DB_PASSWORD:-sfc}@sfc-db:5432/sfc
      - DATA_PATH=/app/data
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyBrptLsSOjexRcwvtCqL-JnIVpH7UYGgT8}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      - GEMINI_TTS_MODEL=${GEMINI_TTS_MODEL:-gemini-2.5-flash-preview-tts}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - MIN_NARRATION_CHARS_FOR_30SEC=${MIN_NARRATION_CHARS_FOR_30SEC:-240}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-AIzaSyDihJslXkYUg6iH4PYMdyp0zRcokdf8RjM}
    volumes:
      - /mnt/sfc/uploads:/app/uploads
      - /mnt/sfc/data:/app/data
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s

  sfc-batch:
    image: ${SFC_BATCH_IMAGE:-choicho/sfc-batch:1.0-amd64}
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
      - DATABASE_URL=postgresql://sfc:${SFC_DB_PASSWORD:-sfc}@sfc-db:5432/sfc
      - DATA_PATH=/app/data
      - WORKER_ID=worker-1
      - POLL_INTERVAL_MS=5000
      - CONCURRENT_JOBS=2
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyBrptLsSOjexRcwvtCqL-JnIVpH7UYGgT8}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      - GEMINI_TTS_MODEL=${GEMINI_TTS_MODEL:-gemini-2.5-flash-preview-tts}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - MIN_NARRATION_CHARS_FOR_30SEC=${MIN_NARRATION_CHARS_FOR_30SEC:-240}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-AIzaSyDihJslXkYUg6iH4PYMdyp0zRcokdf8RjM}
      - USE_WAN_I2V=${USE_WAN_I2V:-true}
      - WAN_I2V_RESOLUTION=${WAN_I2V_RESOLUTION:-480p}
      - WAN_I2V_INTERPOLATE=${WAN_I2V_INTERPOLATE:-true}
    volumes:
      - /mnt/sfc/data:/app/data
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s

  quiz-service:
    image: choicho/gimme-quiz-quiz-service:${QUIZ_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/quiz.production.env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - TZ=Asia/Seoul
    volumes:
      - /project2/gimmeQUIZ2.0/logs/quiz-service:/project2/gimmeQUIZ2.0/logs/quiz-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 150M

  notice-service:
    image: choicho/gimme-quiz-notice-service:${NOTICE_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/notice.production.env
    environment:
      - NODE_ENV=production
      - PORT=3005
      - TZ=Asia/Seoul
    volumes:
      - notice_upload_data:/app/uploads
      - /project2/gimmeQUIZ2.0/logs/notice-service:/project2/gimmeQUIZ2.0/logs/notice-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 70M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rank-service:
    image: choicho/gimme-quiz-rank-service:${RANK_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/rank.production.env
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://rank_user:gkskdlstm1!@rank-postgres:5432/rank_db
      - DB_HOST=rank-postgres
      - DB_PORT=5432
      - DB_NAME=rank_db
      - DB_USER=rank_user
      - DB_PASSWORD=gkskdlstm1!
      - INTER_SERVICE_TOKEN=EQdPfnPfdfGD+1gUr+bvGFzwFffz//GO8195OtlkCx4R0hhW64WqIRFefIIRprUT
      - TZ=Asia/Seoul
    volumes:
      - /project2/gimmeQUIZ2.0/logs/rank-service:/project2/gimmeQUIZ2.0/logs/rank-service
    networks:
      - quiz-network
    depends_on:
      - rank-postgres
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 150M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3006/api/rank/health || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 40s

  user-service:
    image: choicho/gimme-quiz-user-service:${USER_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/user.production.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://admin:gkskdlstm1!@user-mongodb:27017/gimmequiz_users?authSource=admin
      - TZ=Asia/Seoul
    volumes:
      - /project2/gimmeQUIZ2.0/logs/user-service:/project2/gimmeQUIZ2.0/logs/user-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 150M

  point-service:
    image: choicho/gimme-quiz-point-service:${POINT_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/point.production.env
    environment:
      - NODE_ENV=production
      - PORT=${POINT_SERVICE_PORT}
      - TZ=Asia/Seoul
    volumes:
      - /project2/gimmeQUIZ2.0/logs/point-service:/project2/gimmeQUIZ2.0/logs/point-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M

  event-service:
    image: choicho/gimme-quiz-event-service:${EVENT_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/event.production.env
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGODB_URI=mongodb://admin:gkskdlstm1!@event-mongodb:27017/gimme_quiz_event?authSource=admin
      - TZ=Asia/Seoul
    volumes:
      - event_upload_data:/app/uploads
      - event_logs_data:/app/logs
      - /project2/gimmeQUIZ2.0/logs/event-service:/project2/gimmeQUIZ2.0/logs/event-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M

  batch-service:
    image: choicho/gimme-quiz-batch-service:${BATCH_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/batch.production.env
    environment:
      - NODE_ENV=production
      - PORT=3011
      - MONGODB_URI=mongodb://admin:gkskdlstm1!@event-mongodb:27017/gimme_quiz_event?authSource=admin
      - TZ=Asia/Seoul
    volumes:
      - /project2/gimmeQUIZ2.0/logs/batch-service:/project2/gimmeQUIZ2.0/logs/batch-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3011/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  push-service:
    image: choicho/gimme-quiz-push-service:${PUSH_SERVICE_VERSION:-1.0.1}-amd64
    env_file: env/push.production.env
    environment:
      - NODE_ENV=production
      - PORT=3007
      - FIREBASE_PROJECT_ID=gimmequiz2-dc3b6
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/config/firebase-service-account.json
      - TZ=Asia/Seoul
    volumes:
      - /home/quizadm/gimmequiz2-firebase-adminsdk.json:/app/config/firebase-service-account.json:ro
      - /project2/gimmeQUIZ2.0/logs/push-service:/project2/gimmeQUIZ2.0/logs/push-service
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 100M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3007/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ===== Paperclip AI (int-ap-svr) =====
  paperclip-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    volumes:
      - paperclip_postgres_data:/var/lib/postgresql/data
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30

  paperclip-server:
    image: paperclip-local  # 미리 빌드된 이미지 사용
    environment:
      HOST: "0.0.0.0"
      DATABASE_URL: postgres://paperclip:paperclip@paperclip-db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "http://paperclip.choicho.co.kr"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip_secret_change_me}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      PAPERCLIP_HOME: "/paperclip"
    volumes:
      - paperclip_data:/paperclip
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == ap
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
    depends_on:
      - paperclip-db

  # ===== VM-3: DB Zone (int-db-svr) =====
  sfc-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=sfc
      - POSTGRES_PASSWORD=${SFC_DB_PASSWORD:-sfc}
      - POSTGRES_DB=sfc
    volumes:
      - sfc_postgres_data:/var/lib/postgresql/data
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.zone == db
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sfc -d sfc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  quiz-postgres:
    image: postgres:15
    env_file: env/quiz.production.env
    environment:
      - POSTGRES_DB=quiz
      - POSTGRES_USER=quiz_user
      - POSTGRES_PASSWORD=gkskdlstm1!
    volumes:
      - quiz_postgres_data:/var/lib/postgresql/data
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == db
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 300M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUIZ_POSTGRES_USER} -d ${QUIZ_POSTGRES_DB} || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 40s

  rank-postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    env_file: env/rank.production.env
    environment:
      - POSTGRES_DB=rank_db
      - POSTGRES_USER=rank_user
      - POSTGRES_PASSWORD=gkskdlstm1!
    volumes:
      - rank_postgres_data:/var/lib/postgresql/data
    networks:
      - quiz-network
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "10"
        tag: "{{.Name}}/{{.ID}}"
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.labels.zone == db
      resources:
        limits:
          memory: 300M
