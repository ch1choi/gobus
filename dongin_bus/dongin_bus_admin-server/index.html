        let currentDirection = 'up';
        let userLocation = null;

        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        document.getElementById('gps-status').style.display = 'block';
                        document.getElementById('gps-status').innerHTML = `📍 내 위치 확인 완료! 가까운 정류장부터 보여줍니다. <br> <button class="all-view-btn" onclick="resetGps()">전체 노선 보기</button>`;
                        showStops(currentDirection);
                    },
                    () => { showStops(currentDirection); } 
                );
            } else {
                showStops(currentDirection);
            }
            updateButtonUI();
        };

        function resetGps() {
            userLocation = null;
            document.getElementById('gps-status').style.display = 'none';
            showStops(currentDirection);
        }

        function setDirection(dir) {
            currentDirection = dir;
            updateButtonUI();
            showStops(dir);
        }

        function updateButtonUI() {
            document.getElementById('btn-up').classList.toggle('btn-active', currentDirection === 'up');
            document.getElementById('btn-down').classList.toggle('btn-active', currentDirection === 'down');
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function showStops(direction) {
            const listContainer = document.getElementById('stop-list-container');
            listContainer.innerHTML = '';
            
            let stopsToShow = (allBusData[currentRoute] && allBusData[currentRoute][direction]) 
                               ? [...allBusData[currentRoute][direction]] : [];

            if (userLocation && stopsToShow.length > 0) {
                let minIdx = 0, minD = Infinity;
                stopsToShow.forEach((s, i) => {
                    let d = getDistance(userLocation.lat, userLocation.lng, s.lat, s.lng);
                    if (d < minD) { minD = d; minIdx = i; }
                });
                stopsToShow = stopsToShow.slice(minIdx);
            }

            stopsToShow.forEach(stop => {
                const li = document.createElement('li');
                li.className = 'stop-item';
                li.innerHTML = `
                    <div class="stop-header" onclick="toggleTransfer(this, '${stop.sid}', '${stop.name}')">
                        <span>📍 ${stop.name}</span>
                        <span class="transfer-btn">환승보기 🔄</span>
                    </div>
                    <div class="transfer-box"></div>
                `;
                listContainer.appendChild(li);
            });
        }

        async function toggleTransfer(element, sid, stopName) {
            const box = element.nextElementSibling;
            if (box.style.display === 'block') { box.style.display = 'none'; return; }
            
            box.style.display = 'block';
            box.innerHTML = `⏳ 실시간 정보를 불러오는 중...`;

            try {
                const KEY = "dd4c0534cd503e57a9e382fd2c23f911f31eb3652025e3819236420d64449c0d";
                const q = new URLSearchParams({
                    serviceKey: KEY,
                    arsId: String(sid),
                });
                const res = await fetch(`/api/getArrInfoByUid?${q}`);
                
                if (!res.ok) throw new Error(`서버 응답 오류 (상태: ${res.status})`);

                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const mh = xml.querySelector("msgHeader");
                const headerCd = mh?.querySelector("headerCd")?.textContent?.trim();
                const headerMsg = mh?.querySelector("headerMsg")?.textContent?.trim();
                if (headerCd !== undefined && headerCd !== "" && headerCd !== "0") {
                    box.innerHTML = `<div style="color:#d32f2f; font-size:12px;">⚠️ OPEN API 오류 (${headerCd})${headerMsg ? ": " + headerMsg : ""}</div>`;
                    return;
                }
                const items = xml.querySelectorAll("itemList");

                if (items.length === 0) {
                    box.innerHTML = "❌ 도착 예정인 버스가 없습니다.";
                    return;
                }
                
                const groups = {};
                items.forEach(item => {
                    const rNo = item.querySelector("ROUTE_NO").textContent;
                    if (rNo === currentRoute) return; 
                    
                    if (!groups[rNo]) {
                        groups[rNo] = { 
                            dest: item.querySelector("DESTINATION").textContent, 
                            arrs: [] 
                        };
                    }
                    groups[rNo].arrs.push({ 
                        min: item.querySelector("EXTIME_MIN").textContent, 
                        pos: item.querySelector("STATUS_POS").textContent 
                    });
                });

                let html = `<b><span style="color:#00529b;">${stopName}</span> 환승 정보</b><hr style="border:0.5px solid #ccc; margin:10px 0;">`;
                
                const routes = Object.keys(groups);
                if (routes.length === 0) {
                    box.innerHTML = "환승 가능한 다른 노선 정보가 없습니다.";
                    return;
                }

                routes.forEach(r => {
                    const g = groups[r];
                    let info = `<b style="color: #d32f2f;">${g.arrs[0].min}분 (${g.arrs[0].pos}전)</b>`;
                    if (g.arrs[1]) info += `<br><span style="color:#666; font-size:12px;">• 다음: ${g.arrs[1].min}분 (${g.arrs[1].pos}전)</span>`;
                    
                    html += `
                        <div class="arrival-item">
                            <span class="route-badge">${r}번</span> <small>(${g.dest}행)</small><br>
                            <div style="margin-top:5px;">${info}</div>
                        </div>`;
                });
                box.innerHTML = html;

            } catch (e) {
                console.error("에러 상세:", e);
                box.innerHTML = `<div style="color:#d32f2f; font-size:12px;">⚠️ 정보 조회 실패 (네트워크 또는 서버 /api 프록시 확인)</div>`;
            }
        }
    </script>
