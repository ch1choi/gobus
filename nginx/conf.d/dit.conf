# 동인여객 실시간 환승 도우미 — ditransfer.choicho.co.kr
# 배포: 서버의 /etc/nginx/conf.d/dit.conf (또는 compose가 마운트하는 conf.d 경로)
#
# 적용 전 확인:
# 1) 공공데이터포털에서 신청한 API의 «요청주소»에 맞게 아래 proxy_pass URI 수정
# 2) 정적 파일 경로(root)와 서버에 배포한 index.html 위치 일치
# 3) TLS 인증서 SAN에 ditransfer.choicho.co.kr 포함(또는 certbot으로 확장)
# 4) 관리자(dit-admin.choicho.co.kr)는 dit-admin.conf 에서 프록시 — 본 파일에는 포함하지 않음

# ----- HTTP → HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name ditransfer.choicho.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS -----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ditransfer.choicho.co.kr;

    ssl_certificate     /etc/letsencrypt/live/choicho.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/choicho.co.kr/privkey.pem;

    access_log /var/log/nginx/ditransfer-access.log main;
    error_log  /var/log/nginx/ditransfer-error.log warn;

    # 전역 http 블록의 CSP와 유사하게 유지 (인라인 스크립트·스타일 사용)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # 페이지에서 navigator.geolocation 사용 — 전역 Permissions-Policy의 geolocation=()와 충돌 시
    # 브라우저가 더 제한적인 쪽을 택할 수 있음. 문제 시 nginx.conf 전역 정책 조정 또는 headers-more 모듈 검토.
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(self), gyroscope=(), microphone=(), payment=(), usb=()" always;
    # location 에 별도 add_header 없음 → 여기 헤더가 HTML 응답에 적용됨
    add_header Cache-Control "no-cache, must-revalidate" always;

    root /project2/gimmeQUIZ2.0/public/dongin_bus;
    index index.html;

    # 통계 DB 파일이 dongin_bus/_metrics 에 있을 경우 직링크 접근 차단
    location ^~ /_metrics/ {
        deny all;
        return 404;
    }

    # ditransfer connect-src 가 self 라서 동일 호스트 비콘만 가능 → dongin-bus-admin 으로 프록시(호스트 nginx 는 127.0.0.1:3000 등으로 교체 가능)
    location ^~ /dit-collect/ {
        proxy_pass http://dongin-bus-admin:3000/dit-admin/api/collect/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        # 짧은 JSON/204 응답 — proxy_busy_buffers_size 등은 http 기본 proxy_buffers 와 맞춰야 함(미설정 시 emerg)

        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Netlify _redirects 와 동일: /api/* → https://apis.data.go.kr/6300000/arrive/:splat
    #
    # 주의: proxy_pass URL 에 변수($변수)가 들어가면 nginx는 URI 치환을 하지 않고
    # 요청 경로가 그대로 /api/getArrInfoByUid 로 업스트림에 전달되어 404 가 난다.
    # 따라서 호스트는 고정 문자열로 두고 proxy_pass 한다.
    location /api/ {
        proxy_pass https://apis.data.go.kr/6300000/arrive/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_ssl_server_name on;
        proxy_ssl_name apis.data.go.kr;
        # CA 번들이 없는 최소 이미지에서는 검증 실패로 502/500 이 날 수 있음.
        proxy_ssl_verify off;

        proxy_set_header Host apis.data.go.kr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        add_header Cache-Control "no-store" always;
    }

    # Swarm 업스트림 DNS만 변수가 필요하면 아래 패턴 사용(reproxy_pass 에 변수 없음).
    # rewrite 로 최종 경로만 만들고 proxy_pass 는 호스트 고정.
    # location /api/ {
    #     resolver 127.0.0.11 valid=10s ipv6=off;
    #     rewrite ^/api/(.*)$ /6300000/arrive/$1 break;
    #     proxy_pass https://apis.data.go.kr;
    #     ...
    # }
}
