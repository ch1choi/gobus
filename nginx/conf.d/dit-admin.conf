# dongin_bus 관리자 — dit-admin.choicho.co.kr
# 배포: /etc/nginx/conf.d/dit-admin.conf (또는 compose 마운트 경로)
#
# 적용 전 확인:
# 1) DNS A/AAAA 또는 CNAME 로 dit-admin.choicho.co.kr 이 본 서버를 가리키는지
# 2) TLS 인증서 SAN 에 dit-admin.choicho.co.kr 포함(와일드카드 *.choicho.co.kr 또는 certbot --expand)
# 3) admin-server 가 같은 호스트에서 리스닝하고, DONGIN_BUS_DIR 이 ditransfer 의 index.html 과 동일 디렉터리인지
# 4) http 블록에 limit_req_zone api 가 없으면 아래 limit_req 한 줄 제거

# ----- HTTP → HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name dit-admin.choicho.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS → Node admin-server (경로는 앱 기준 /dit-admin/ 유지) -----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dit-admin.choicho.co.kr;

    ssl_certificate     /etc/letsencrypt/live/choicho.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/choicho.co.kr/privkey.pem;

    access_log /var/log/nginx/dit-admin-access.log main;
    error_log  /var/log/nginx/dit-admin-error.log warn;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-store" always;

    # 업로드 시 본문 크기 (nginx 기본 1m 초과 방지)
    client_max_body_size 3m;

    location = / {
        return 302 /dit-admin/;
    }

    location = /dit-admin {
        return 302 /dit-admin/;
    }

    location / {
        limit_req zone=api burst=20 nodelay;

        # Swarm: nginx-proxy 와 dongin-bus-admin 이 같은 overlay(예: quiz-network)일 때
        proxy_pass http://dongin-bus-admin:3000;
        # 호스트 nginx 전용(컨테이너 아님) + Node 가 호스트 3000 에 바인딩할 때만:
        # proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
