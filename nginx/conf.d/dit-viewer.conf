# 동인여객 버스 CCTV 뷰어 — ditcctv.choicho.co.kr
# 배포: 서버의 /etc/nginx/conf.d/dit-viewer.conf (또는 compose가 마운트하는 conf.d 경로)
#
# 적용 전 확인:
# 1) cctv_viewer Docker 컨테이너가 8888 포트로 실행 중인지 확인
# 2) 정적 파일 경로(root)와 서버에 배포한 index.html 위치 일치
# 3) TLS 인증서 SAN에 ditcctv.choicho.co.kr 포함(또는 certbot으로 확장)
# 4) /api/ 경로는 cctv_viewer 컨테이너(ITS/대전시 CCTV API 프록시)로 전달

# ----- HTTP → HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name ditcctv.choicho.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS -----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ditcctv.choicho.co.kr;

    ssl_certificate     /etc/letsencrypt/live/choicho.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/choicho.co.kr/privkey.pem;

    access_log /var/log/nginx/ditcctv-access.log main;
    error_log  /var/log/nginx/ditcctv-error.log warn;

    # CSP: HLS.js 스트리밍 지원 + 외부 CCTV 스트림 허용
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' https: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # Permissions-Policy: 위치 정보 허용 (정류장 위치 기반)
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(self), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Cache-Control "no-cache, must-revalidate" always;

    root /project2/gimmeQUIZ2.0/public/dongin_bus/cctv_viewer;
    index index.html;

    location / {
        # 정적 파일이 있으면 nginx에서 직접 서빙, 없으면 백엔드로
        try_files $uri @backend;
    }

    # 백엔드 프록시 (정적 파일이 없을 때 또는 SPA 라우팅)
    location @backend {
        proxy_pass http://cctv-viewer:8888;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_intercept_errors on;
    }

    # /api/* → cctv_viewer Docker 컨테이너 (포트 8888)
    # cctv_viewer의 Netlify Functions를 Express로 대체한 백엔드로 프록시
    # API 엔드포인트: /api/cctv-route, /api/cctv-refresh
    location /api/ {
        # Docker Compose/Swarm에서 cctv-viewer 서비스명 사용
        # 단일 컨테이너 환경에서는 localhost:8888 또는 127.0.0.1:8888 사용
        proxy_pass http://cctv-viewer:8888/api/;
        
        # 로컬 단일 컨테이너 환경인 경우 아래 주석 해제
        # proxy_pass http://127.0.0.1:8888/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        add_header Cache-Control "no-store" always;
    }

    # 정적 데이터 파일 (routes.json)
    location /data/ {
        alias /project2/gimmeQUIZ2.0/public/dongin_bus/cctv_viewer/data/;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # HLS 스트림 프록시 (필요 시)
    # CCTV 스트림이 CORS 문제가 있을 경우 nginx를 통해 프록시
    location /stream/ {
        # 예시: location /stream/its/ → ITS CCTV 스트림
        # proxy_pass http://its-stream-server/;
        # 
        # 또는 외부 HLS URL을 직접 프록시
        # rewrite ^/stream/(.*)$ /$1 break;
        # proxy_pass http://external-cctv-server;
        
        # 현재는 클라이언트가 직접 HLS URL 접근하므로 비활성화
        return 404;
    }
}
