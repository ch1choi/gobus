<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GO BUS!</title>
    <link rel="manifest" href="/manifest.json">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tesseract.js (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-border { animation: pulseBorder 2s infinite; }
        @keyframes pulseBorder { 0% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="root"></div>

<script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const API_BASE = '';

    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = atob(base64);
        const output = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) output[i] = rawData.charCodeAt(i);
        return output;
    }
    function arrayBufferToBase64Url(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function App() {
        const getTodayStr = () => new Date().toDateString();
        
        const [alarms, setAlarms] = useState(() => {
            const savedAlarms = localStorage.getItem('smartAlarms');
            if (savedAlarms) {
                try {
                    const parsed = JSON.parse(savedAlarms);
                    return parsed.filter(a => a.date === getTodayStr());
                } catch (e) { return []; }
            }
            return [];
        });

        const [tesseractReady, setTesseractReady] = useState(false);
        const [isCameraActive, setIsCameraActive] = useState(false);
        const [isProcessing, setIsProcessing] = useState(false);
        const [errorMsg, setErrorMsg] = useState('');
        const [successMsg, setSuccessMsg] = useState('');
        
        const [extractedTimes, setExtractedTimes] = useState([]);
        const [selectedTimes, setSelectedTimes] = useState([]); 
        const [offsetMinutes, setOffsetMinutes] = useState(5);
        
        const [ringingAlarm, setRingingAlarm] = useState(null);
        const [showManualInput, setShowManualInput] = useState(false);
        const [manualTime, setManualTime] = useState('12:00');

        // 시스템 기능 상태
        const [wakeLockActive, setWakeLockActive] = useState(false);
        const [notificationsGranted, setNotificationsGranted] = useState(false);

        const videoRef = useRef(null);
        const canvasRef = useRef(null);
        const streamRef = useRef(null);
        const audioCtxRef = useRef(null);
        const alarmIntervalRef = useRef(null);
        const fileInputRef = useRef(null);
        const wakeLockRef = useRef(null);
        const pushSubscriptionRef = useRef(null);

        // --- Web Push 구독 (서버 알람용) ---
        const ensurePushSubscription = async () => {
            if (pushSubscriptionRef.current) return pushSubscriptionRef.current;
            if (!('Notification' in window) || !('serviceWorker' in navigator)) return null;
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') return null;
            const reg = await navigator.serviceWorker.register(API_BASE + '/sw.js');
            await reg.update();
            const res = await fetch(API_BASE + '/api/vapid-public');
            if (!res.ok) return null;
            const { publicKey } = await res.json();
            const sub = await reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(publicKey),
            });
            const payload = { endpoint: sub.endpoint, keys: { p256dh: arrayBufferToBase64Url(sub.getKey('p256dh')), auth: arrayBufferToBase64Url(sub.getKey('auth')) } };
            await fetch(API_BASE + '/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            pushSubscriptionRef.current = payload;
            return payload;
        };

        // --- 핵심 추가 기능 1: 화면 꺼짐 방지 (Wake Lock API) ---
        const requestWakeLock = async () => {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLockRef.current = await navigator.wakeLock.request('screen');
                setWakeLockActive(true);
                wakeLockRef.current.addEventListener('release', () => {
                    setWakeLockActive(false);
                });
            } catch (_err) {
                // Permissions-Policy 미허용 또는 사용자 거부 시 실패 → 무시 (앱 동작에는 영향 없음)
            }
        };

        // --- 핵심 추가 기능 2: 백그라운드 푸시 알림 권한 요청 ---
        const requestNotificationPermission = async () => {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                setNotificationsGranted(permission === 'granted');
            }
        };

        // 초기 설정 (스크립트 로드 및 화면 유지)
        useEffect(() => {
            if (window.Tesseract) setTesseractReady(true);
            
            // 앱 실행 시 화면 켜짐 유지 시도 및 알림 권한 요청
            requestWakeLock();
            if ('Notification' in window && Notification.permission === 'granted') {
                setNotificationsGranted(true);
            }

            // 브라우저 탭을 나갔다 들어올 때마다 화면 켜짐 유지 재요청
            const handleVisibilityChange = () => {
                if (document.visibilityState === 'visible') {
                    requestWakeLock();
                }
            };
            document.addEventListener('visibilitychange', handleVisibilityChange);
            
            return () => {
                document.removeEventListener('visibilitychange', handleVisibilityChange);
                if (wakeLockRef.current) wakeLockRef.current.release();
            };
        }, []);

        useEffect(() => {
            localStorage.setItem('smartAlarms', JSON.stringify(alarms));
        }, [alarms]);

        // 알람 체크 루프
        useEffect(() => {
            const interval = setInterval(() => {
                const now = new Date();
                const currentHHMM = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                
                setAlarms(prevAlarms => {
                    let hasChanges = false;
                    const newAlarms = prevAlarms.map(alarm => {
                        if (alarm.active && alarm.alarmTime === currentHHMM) {
                            hasChanges = true;
                            triggerAlarm(alarm);
                            return { ...alarm, active: false };
                        }
                        return alarm;
                    });
                    return hasChanges ? newAlarms : prevAlarms;
                });
            }, 5000); 
            return () => clearInterval(interval);
        }, []);

        useEffect(() => {
            if (successMsg || errorMsg) {
                const timer = setTimeout(() => { setSuccessMsg(''); setErrorMsg(''); }, 4000);
                return () => clearTimeout(timer);
            }
        }, [successMsg, errorMsg]);

        const handleReset = () => {
            if (window.confirm('등록된 모든 알람과 데이터를 초기화하시겠습니까?')) {
                setAlarms([]);
                setExtractedTimes([]);
                setSelectedTimes([]);
                stopCamera();
                localStorage.removeItem('smartAlarms');
                localStorage.removeItem('smartAlarms_backup');
                setSuccessMsg('모든 데이터가 초기화되었습니다.');
            }
        };

        const initAudio = () => {
            if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
            
            // 사용자가 화면을 터치할 때 권한들도 함께 확보 시도
            requestWakeLock();
            requestNotificationPermission();
        };

        // --- カメラ/갤러리 로직 ---
        const startCamera = async () => {
            initAudio(); 
            setErrorMsg('');
            setExtractedTimes([]);
            setSelectedTimes([]);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1080 }, height: { ideal: 1080 } }, audio: false 
                });
                streamRef.current = stream;
                setIsCameraActive(true);

                setTimeout(() => {
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        videoRef.current.play().catch(e => console.error(e));
                    }
                }, 100);
            } catch (err) {
                setErrorMsg('카메라 권한을 허용해주세요.');
            }
        };

        const stopCamera = () => {
            if (streamRef.current) {
                streamRef.current.getTracks().forEach(t => t.stop());
                streamRef.current = null;
            }
            if (videoRef.current) videoRef.current.srcObject = null;
            setIsCameraActive(false);
        };

        const capturePhoto = async () => {
            if (videoRef.current && canvasRef.current) {
                const video = videoRef.current;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                const size = Math.min(video.videoWidth, video.videoHeight);
                const startX = (video.videoWidth - size) / 2;
                const startY = (video.videoHeight - size) / 2;
                
                canvas.width = size;
                canvas.height = size;
                
                ctx.filter = 'grayscale(100%) contrast(150%) brightness(1.2)';
                ctx.drawImage(video, startX, startY, size, size, 0, 0, size, size);
                
                const imageDataUrl = canvas.toDataURL('image/jpeg');
                stopCamera();
                setTimeout(() => { processImageText(imageDataUrl); }, 100);
            }
        };

        const handleFileUpload = (e) => {
            initAudio();
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    ctx.filter = 'grayscale(100%) contrast(150%) brightness(1.2)';
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    
                    const imageDataUrl = canvas.toDataURL('image/jpeg');
                    setTimeout(() => { processImageText(imageDataUrl); }, 100);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = null;
        };

        // --- OCR 분석 ---
        const processImageText = async (dataUrl) => {
            if (!window.Tesseract) {
                setErrorMsg('AI 엔진이 로딩되지 않았습니다.'); return;
            }
            setIsProcessing(true); setErrorMsg('');

            try {
                const worker = await window.Tesseract.createWorker('kor+eng');
                const ret = await worker.recognize(dataUrl);
                await worker.terminate();

                const now = new Date();
                const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();

                const regex = /(?:^|\s|[^0-9])([01]?[0-9]|2[0-3])\s*[:.시]\s*([0-5][0-9])(?:분)?(?:\s|$|[^0-9])/g;
                let foundTimes = [];
                
                if (ret.data && ret.data.lines) {
                    ret.data.lines.forEach(line => {
                        const lineText = line.text.replace(/\s+/g, '');
                        if (lineText.includes("도착") || lineText.includes("소요") || lineText.includes("걸리는") || lineText.includes("종점")) return;

                        const matches = [...line.text.matchAll(regex)];
                        matches.forEach(m => {
                            const h = parseInt(m[1], 10);
                            const m_val = parseInt(m[2], 10);
                            if (h * 60 + m_val >= currentTotalMinutes) {
                                foundTimes.push(`${h.toString().padStart(2, '0')}:${m_val.toString().padStart(2, '0')}`);
                            }
                        });
                    });
                }

                if (foundTimes.length === 0) {
                     const fallbackMatches = [...ret.data.text.matchAll(regex)];
                     fallbackMatches.forEach(m => {
                         const h = parseInt(m[1], 10);
                         const m_val = parseInt(m[2], 10);
                         if (h * 60 + m_val >= currentTotalMinutes) {
                             foundTimes.push(`${h.toString().padStart(2, '0')}:${m_val.toString().padStart(2, '0')}`);
                         }
                     });
                }

                const uniqueFutureTimes = [...new Set(foundTimes)].sort();
                
                if (uniqueFutureTimes.length === 0) {
                    setErrorMsg('이후 출발시간을 찾지 못했습니다.');
                } else {
                    setExtractedTimes(uniqueFutureTimes);
                    setSelectedTimes([]); 
                }
            } catch (err) {
                setErrorMsg('이미지 분석 중 오류가 발생했습니다.');
            } finally {
                setIsProcessing(false);
            }
        };

        const toggleTimeSelection = (time) => {
            initAudio();
            setSelectedTimes(prev => prev.includes(time) ? prev.filter(t => t !== time) : [...prev, time].sort());
        };

        const registerAlarms = async () => {
            if (selectedTimes.length === 0) return;
            initAudio();
            const todayStr = getTodayStr();

            const newAlarms = selectedTimes.map(time => {
                const [h, m] = time.split(':').map(Number);
                let date = new Date();
                date.setHours(h, m, 0, 0);
                date.setMinutes(date.getMinutes() - offsetMinutes);
                const alarmTimeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

                return {
                    id: Math.random().toString(36).substr(2, 9),
                    date: todayStr, originalTime: time, alarmTime: alarmTimeStr, offset: offsetMinutes, active: true
                };
            });

            const subscription = await ensurePushSubscription();
            if (subscription) {
                try {
                    await fetch(API_BASE + '/api/alarms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            alarms: newAlarms.map(a => ({ id: a.id, originalTime: a.originalTime, alarmTime: a.alarmTime, offset: a.offset })),
                            subscription,
                        }),
                    });
                } catch (e) {
                    setErrorMsg('서버에 알람 등록에 실패했습니다. 알람은 기기에만 저장됩니다.');
                }
            }

            setAlarms(prev => {
                const existingTimes = prev.map(a => a.originalTime + a.offset);
                const filteredNew = newAlarms.filter(a => !existingTimes.includes(a.originalTime + a.offset));
                return [...prev, ...filteredNew].sort((a, b) => a.alarmTime.localeCompare(b.alarmTime));
            });
            
            setExtractedTimes([]); setSelectedTimes([]); setSuccessMsg('알람이 등록되었습니다.');
        };

        const deleteAlarm = async (id) => {
            try { await fetch(API_BASE + '/api/alarms/' + id, { method: 'DELETE' }); } catch (_) {}
            setAlarms(prev => prev.filter(a => a.id !== id));
        };

        // --- 알람 발생 및 소리 처리 ---
        const playBeepPattern = () => {
            if (!audioCtxRef.current) return;
            const ctx = audioCtxRef.current;
            if (ctx.state === 'suspended') ctx.resume();

            const playTone = (startTime) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(1000, startTime); 
                osc.frequency.exponentialRampToValueAtTime(800, startTime + 0.1);
                gain.gain.setValueAtTime(1.0, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(startTime); osc.stop(startTime + 0.15);
            };

            const now = ctx.currentTime;
            playTone(now); playTone(now + 0.2); playTone(now + 0.4);
        };

        const startAlarmSound = () => {
            initAudio();
            playBeepPattern();
            alarmIntervalRef.current = setInterval(() => {
                playBeepPattern();
                if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
            }, 1000); 
        };

        const stopAlarmSound = () => {
            if (alarmIntervalRef.current) {
                clearInterval(alarmIntervalRef.current);
                alarmIntervalRef.current = null;
            }
        };

        const triggerAlarm = (alarm) => {
            setRingingAlarm(alarm);
            startAlarmSound();
            
            // 앱이 백그라운드에 있을 때 푸시 알림 전송 시도
            if ('Notification' in window && Notification.permission === 'granted' && document.visibilityState !== 'visible') {
                try {
                    new Notification("GO BUS! 출발 알람", {
                        body: `${alarm.originalTime} 출발 버스${alarm.offset === 0 ? '가 지금 출발합니다!' : ` 출발 ${alarm.offset}분 전입니다.`}`,
                        requireInteraction: true // 사용자가 닫을 때까지 알림 유지 (일부 브라우저 지원)
                    });
                } catch(e) { console.log(e); }
            }
        };

        const dismissAlarm = () => {
            setRingingAlarm(null);
            stopAlarmSound();
        };

        const submitManualTime = () => {
            if (manualTime) {
                setExtractedTimes(prev => [...new Set([...prev, manualTime])].sort());
                setSelectedTimes(prev => [...new Set([...prev, manualTime])].sort());
                setErrorMsg(''); setShowManualInput(false);
            }
        };

        const saveAlarmsExplicitly = () => {
            if (alarms.length === 0) return setErrorMsg('저장할 내역이 없습니다.');
            localStorage.setItem('smartAlarms_backup', JSON.stringify(alarms));
            setSuccessMsg('현재 목록이 기기에 백업되었습니다.');
        };

        const loadAlarmsExplicitly = () => {
            const backup = localStorage.getItem('smartAlarms_backup');
            if (backup) {
                try {
                    const parsed = JSON.parse(backup);
                    const todayStr = getTodayStr();
                    setAlarms(parsed.map(a => ({...a, date: todayStr})));
                    setSuccessMsg('백업 데이터를 불러왔습니다.');
                } catch (e) { setErrorMsg('불러오기 오류'); }
            } else { setErrorMsg('저장된 데이터가 없습니다.'); }
        };

        return (
            <div className="min-h-screen flex flex-col items-center">
                <div className="w-full max-w-md bg-white min-h-screen md:min-h-[850px] shadow-xl overflow-hidden relative">
                    
                    {/* Header with Reset Button */}
                    <div className="bg-indigo-600 text-white p-5 flex items-center justify-between sticky top-0 z-20 shadow-md">
                        <h1 className="text-xl font-bold flex items-center gap-2">
                            <i className="fas fa-bus text-xl"></i> GO BUS!
                        </h1>
                        <div className="flex items-center gap-3">
                            {alarms.filter(a => a.active).length > 0 && (
                                <span className="bg-indigo-500 text-xs px-2 py-1 rounded-full font-semibold flex items-center gap-1 shadow-sm">
                                    <i className="fas fa-bell animate-pulse"></i> {alarms.filter(a => a.active).length}
                                </span>
                            )}
                            <button onClick={handleReset} className="bg-indigo-500 hover:bg-indigo-400 text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors shadow-sm" title="모든 데이터 초기화">
                                <i className="fas fa-rotate-right text-sm"></i>
                            </button>
                        </div>
                    </div>

                    {/* 백그라운드/잠금 화면 알람 안내 */}
                    <div className="bg-indigo-50 px-4 py-2 border-b border-indigo-200 text-xs text-indigo-800 flex items-start gap-2">
                        <i className="fas fa-bell mt-0.5 text-indigo-600"></i>
                        <p className="flex-1">
                            백그라운드·잠금 화면에서도 알람을 받으려면 <strong>알림 권한을 허용</strong>해 주세요. iOS는 <strong>홈 화면에 추가</strong> 후 사용하세요.
                        </p>
                    </div>
                    
                    {/* 시스템 상태 표시 (디버깅 및 사용자 안심용) */}
                    <div className="px-4 py-1.5 flex justify-between text-[10px] font-bold bg-slate-100 border-b border-slate-200">
                        <span className={wakeLockActive ? "text-emerald-600" : "text-slate-400"}>
                            <i className="fas fa-mobile-screen mr-1"></i> 
                            {wakeLockActive ? "화면 켜짐 유지 중" : "화면 유지 권한 없음"}
                        </span>
                        <span onClick={requestNotificationPermission} className={`cursor-pointer ${notificationsGranted ? "text-emerald-600" : "text-red-500 underline"}`}>
                            <i className="fas fa-comment-dots mr-1"></i>
                            {notificationsGranted ? "백그라운드 알림 켜짐" : "알림 권한 켜기(터치)"}
                        </span>
                    </div>

                    <div className="p-5 pb-24 relative">
                        {errorMsg && (
                            <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl flex items-center gap-2 text-sm border border-red-100 shadow-sm animate-in">
                                <i className="fas fa-circle-exclamation text-lg"></i><p className="flex-1 font-medium">{errorMsg}</p>
                            </div>
                        )}
                        {successMsg && (
                            <div className="mb-4 p-3 bg-indigo-50 text-indigo-700 rounded-xl flex items-center gap-2 text-sm border border-indigo-100 shadow-sm animate-in">
                                <i className="fas fa-circle-check text-lg"></i><p className="flex-1 font-medium">{successMsg}</p>
                            </div>
                        )}

                        {isProcessing ? (
                            <div className="flex flex-col items-center justify-center py-20 animate-in">
                                <i className="fas fa-spinner fa-spin text-5xl text-indigo-500 mb-4"></i>
                                <p className="text-indigo-900 font-bold">시간표를 분석 중입니다...</p>
                                <p className="text-slate-500 text-sm mt-2 text-center px-4">도착, 소요시간 등 불필요한 단어를 걸러내고<br/>정확한 시간만 찾습니다.</p>
                            </div>
                        ) : 
                        
                        extractedTimes.length > 0 ? (
                            <div className="animate-in">
                                <div className="flex justify-between items-end mb-3">
                                    <h2 className="text-lg font-bold text-slate-800">1. 출발 시간 선택 (현재 이후)</h2>
                                    <button onClick={() => { setShowManualInput(true); initAudio(); }} className="text-sm text-indigo-600 font-bold bg-indigo-50 px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-indigo-100">
                                        <i className="fas fa-plus"></i> 추가
                                    </button>
                                </div>
                                
                                <div className="grid grid-cols-3 gap-2 mb-6 max-h-48 overflow-y-auto p-1">
                                    {extractedTimes.map((time, idx) => {
                                        const isSelected = selectedTimes.includes(time);
                                        return (
                                            <button key={idx} onClick={() => toggleTimeSelection(time)}
                                                className={`py-3 px-2 rounded-xl border-2 flex items-center justify-center gap-2 font-bold text-base transition-all ${
                                                    isSelected ? 'border-indigo-600 bg-indigo-50 text-indigo-700 shadow-sm' : 'border-slate-200 bg-white text-slate-500 hover:border-indigo-300'
                                                }`}
                                            >
                                                <i className={`${isSelected ? "fas fa-square-check text-indigo-600" : "far fa-square text-slate-400"}`}></i> {time}
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="animate-in pt-4 border-t border-slate-100">
                                    <h2 className="text-lg font-bold text-slate-800 mb-3">2. 언제 알려드릴까요?</h2>
                                    <div className="flex gap-2 mb-6 bg-slate-100 p-1.5 rounded-xl">
                                        {[0, 5, 10].map(min => (
                                            <button key={min} onClick={() => { setOffsetMinutes(min); initAudio(); }}
                                                className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-colors ${
                                                    offsetMinutes === min ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                {min === 0 ? '정각' : `${min}분 전`}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="flex gap-2">
                                        <button onClick={() => { setExtractedTimes([]); setSelectedTimes([]); }} className="flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">취소</button>
                                        <button onClick={registerAlarms} disabled={selectedTimes.length === 0}
                                            className={`flex-[2] py-3.5 font-bold rounded-xl transition-all flex items-center justify-center gap-2 ${
                                                selectedTimes.length > 0 ? 'bg-indigo-600 text-white shadow-lg active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                            }`}
                                        >
                                            <i className="fas fa-bell"></i> {selectedTimes.length > 0 ? `${selectedTimes.length}개 알람 등록` : '시간을 선택하세요'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : 
                        
                        isCameraActive ? (
                            <div className="flex flex-col items-center animate-in w-full">
                                <div className="w-full flex justify-between items-center mb-3 px-1">
                                    <span className="text-slate-600 font-bold text-sm bg-indigo-50 px-3 py-1 rounded-full text-indigo-700">원하는 출발시간만 화면에 꽉 차게 찍어주세요.</span>
                                    <button onClick={stopCamera} className="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200"><i className="fas fa-xmark text-lg"></i></button>
                                </div>
                                
                                <div className="relative w-full aspect-square bg-slate-900 rounded-3xl overflow-hidden mb-6 shadow-inner pulse-border">
                                    <video ref={videoRef} autoPlay playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover' }} className="absolute inset-0" />
                                    <div className="absolute inset-0 border-4 border-white/30 m-6 rounded-2xl flex items-center justify-center pointer-events-none">
                                        <div className="w-16 h-16 border-2 border-white/60 rounded-full flex items-center justify-center">
                                            <div className="w-1 h-1 bg-red-500 rounded-full"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <button onClick={capturePhoto} className="w-20 h-20 bg-white rounded-full border-8 border-indigo-200 shadow-xl hover:scale-105 active:scale-95 transition-transform flex-shrink-0 z-10 flex items-center justify-center">
                                    <div className="w-14 h-14 bg-indigo-600 rounded-full"></div>
                                </button>
                                <canvas ref={canvasRef} className="hidden" />
                            </div>
                        ) : 
                        
                        (
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={startCamera} className="group flex flex-col items-center justify-center gap-3 p-6 w-full rounded-3xl border-2 border-dashed border-indigo-200 bg-indigo-50/50 text-indigo-600 hover:bg-indigo-50 transition-all active:scale-[0.98]">
                                        <div className="p-4 bg-white rounded-full shadow-md border border-indigo-100 group-hover:scale-110 transition-transform">
                                            <i className="fas fa-camera text-2xl text-indigo-600"></i>
                                        </div>
                                        <span className="font-extrabold text-base">카메라 촬영</span>
                                    </button>

                                    <button onClick={() => fileInputRef.current?.click()} className="group flex flex-col items-center justify-center gap-3 p-6 w-full rounded-3xl border-2 border-dashed border-emerald-200 bg-emerald-50/50 text-emerald-600 hover:bg-emerald-50 transition-all active:scale-[0.98]">
                                        <div className="p-4 bg-white rounded-full shadow-md border border-emerald-100 group-hover:scale-110 transition-transform">
                                            <i className="fas fa-image text-2xl text-emerald-600"></i>
                                        </div>
                                        <span className="font-extrabold text-base">갤러리 선택</span>
                                    </button>
                                </div>
                                <input type="file" accept="image/*" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />

                                <div className="flex gap-3">
                                    <button onClick={() => { setShowManualInput(true); initAudio(); }} className="flex-1 py-4 flex flex-col items-center justify-center gap-1 text-slate-600 bg-white rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50 font-bold transition-all active:scale-[0.98]">
                                        <i className="fas fa-pen mb-1 text-indigo-500"></i> 수동 추가
                                    </button>
                                    <button onClick={saveAlarmsExplicitly} className="flex-1 py-4 flex flex-col items-center justify-center gap-1 text-slate-600 bg-white rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50 font-bold transition-all active:scale-[0.98]">
                                        <i className="fas fa-floppy-disk mb-1 text-emerald-500"></i> 기기 백업
                                    </button>
                                    <button onClick={loadAlarmsExplicitly} className="flex-1 py-4 flex flex-col items-center justify-center gap-1 text-slate-600 bg-white rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-50 font-bold transition-all active:scale-[0.98]">
                                        <i className="fas fa-cloud-arrow-down mb-1 text-blue-500"></i> 불러오기
                                    </button>
                                </div>

                                <div className="pt-6">
                                    <h3 className="text-slate-800 font-extrabold text-lg mb-4 flex items-center gap-2">
                                        <i className="fas fa-list-check text-indigo-500"></i> 오늘 등록된 알람
                                    </h3>
                                    
                                    {alarms.length === 0 ? (
                                        <div className="text-center py-10 text-slate-400 bg-slate-100/50 rounded-3xl border border-slate-100 border-dashed">
                                            <i className="fas fa-bell-slash text-3xl mx-auto mb-3 opacity-50"></i>
                                            <p className="font-medium">등록된 알람이 없습니다.</p>
                                        </div>
                                    ) : (
                                        <ul className="space-y-3 pb-4">
                                            {alarms.map(alarm => (
                                                <li key={alarm.id} className={`p-4 rounded-2xl border-2 ${alarm.active ? 'bg-white border-indigo-100 shadow-sm' : 'bg-slate-50 border-slate-100 opacity-60'} flex items-center justify-between transition-all`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl ${alarm.active ? 'bg-indigo-50 text-indigo-700' : 'bg-slate-200 text-slate-500'}`}>
                                                            {alarm.alarmTime}
                                                        </div>
                                                        <div>
                                                            <p className="font-extrabold text-slate-800 text-lg mb-0.5">출발 {alarm.originalTime}</p>
                                                            <p className="text-sm font-bold text-slate-500 flex items-center gap-1">
                                                                <i className="fas fa-bell text-xs"></i>
                                                                {alarm.offset === 0 ? '정각 알람' : `${alarm.offset}분 전 알람`}
                                                                {!alarm.active && <span className="ml-2 text-xs bg-slate-200 px-2 py-0.5 rounded-md text-slate-600">종료</span>}
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deleteAlarm(alarm.id)} className="p-3 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                                                        <i className="fas fa-trash-can text-lg"></i>
                                                    </button>
                                                </li>
                                            ))}
                                        </ul>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Manual Input Modal */}
                    {showManualInput && (
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-md z-40 flex items-center justify-center p-6 animate-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl border border-slate-100">
                                <h3 className="text-xl font-extrabold text-slate-800 mb-2">시간 수동 추가</h3>
                                <p className="text-sm font-medium text-slate-500 mb-6">등록할 출발 시간을 선택해주세요.</p>
                                
                                <input type="time" value={manualTime} onChange={(e) => setManualTime(e.target.value)}
                                    className="w-full p-4 border-2 border-indigo-100 rounded-2xl mb-6 text-3xl text-center font-black text-indigo-700 bg-indigo-50/50 focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition-all" />
                                
                                <div className="flex gap-2">
                                    <button onClick={() => setShowManualInput(false)} className="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">취소</button>
                                    <button onClick={submitManualTime} className="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 active:scale-95">추가하기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Ringing Modal */}
                    {ringingAlarm && (
                        <div className="absolute inset-0 bg-indigo-900/95 backdrop-blur-xl z-50 flex items-center justify-center p-6 animate-in">
                            <div className="bg-white p-8 rounded-[2.5rem] w-full text-center shadow-2xl relative overflow-hidden border-4 border-red-500">
                                <div className="absolute top-0 left-0 w-full h-3 bg-red-500 animate-pulse"></div>
                                
                                <div className="w-28 h-28 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 relative shadow-inner">
                                    <div className="absolute inset-0 rounded-full border-4 border-red-300 animate-ping opacity-75"></div>
                                    <i className="fas fa-volume-high text-5xl relative z-10 animate-bounce"></i>
                                </div>
                                
                                <h2 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">알람 시간!</h2>
                                <p className="text-2xl text-slate-600 font-extrabold mb-2">
                                    {ringingAlarm.originalTime} 출발 버스
                                </p>
                                <div className="bg-red-50 py-3 px-6 rounded-2xl inline-block mb-8">
                                    <p className="text-red-600 font-black text-xl">
                                        {ringingAlarm.offset === 0 ? '지금 당장 출발합니다!' : `출발 ${ringingAlarm.offset}분 전입니다.`}
                                    </p>
                                </div>
                                
                                <button onClick={dismissAlarm} className="w-full py-5 bg-red-600 text-white font-black text-xl rounded-2xl hover:bg-red-700 active:scale-95 transition-all shadow-xl shadow-red-200 flex justify-center items-center gap-2">
                                    <i className="fas fa-power-off"></i> 알람 끄기
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
